name: Atualizar dados do Notion

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      data_changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Buscar dados do Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_DATABASE_ID_DISP: ${{ secrets.NOTION_DATABASE_ID_DISP }}
        run: python fetch_notion.py

      - name: Commit e push do data.json
        id: check
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "Sem alterações no data.json — deploy ignorado."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: atualiza data.json"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: fetch
    if: needs.fetch.outputs.data_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main  # garante que pega o commit novo com o data.json atualizado

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
