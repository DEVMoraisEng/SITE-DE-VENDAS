name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Ignora commits do bot para não criar loop infinito
# O fetch_notion.yml faz push do data.json → sem esse filtro,
# cada atualização do Notion dispara um deploy desnecessário
jobs:
  deploy:
    # Não roda se o commit vier do github-actions[bot]
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    concurrency:
      group: pages
      cancel-in-progress: true   # cancela deploy anterior se vier novo — evita fila

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
